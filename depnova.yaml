project:
  name: "accops-employee-portal"
  root_path: "./demo-app"
  output_dir: "./demo-app/depnova-reports"

settings:
  log_level: "INFO"
  fail_on_error: false

pipeline:
  # Phase 3A: Frontend CDN detection
  - plugin: "frontend_scanner"
    enabled: true
    config:
      html_scan_paths: [".", "./templates", "./public"]
      detect_cdn: true
      scan_static_assets: true
      min_file_size_bytes: 100

  # Phase 3B: JS fingerprinting
  - plugin: "js_fingerprinter"
    enabled: true
    config:
      use_retirejs_db: true
      cache_dir: "~/.depnova/cache"
      cache_ttl_hours: 24
      scan_sourcemaps: true
      include_vulnerabilities: true

  # Phase 5: Merge & deduplicate
  - plugin: "dependency_merger"
    enabled: true
    config:
      normalize_names: true
      merge_cdn_and_npm: true
      drop_no_version: false
      prefer_locked: true

  # Phase 6: Generate reports
  - plugin: "report_generator"
    enabled: true
    config:
      formats: ["cyclonedx-json", "html", "csv"]
      include_vulnerabilities: true
      include_metadata: true
