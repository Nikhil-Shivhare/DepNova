project:
  name: "demo-webapp"
  root_path: "./demo-app"
  output_dir: "./demo-app/depnova-reports"

settings:
  log_level: "INFO"
  fail_on_error: false

pipeline:
  # Phase 1
  - plugin: "manifest_scanner"
    enabled: true
    config:
      files: ["requirements.txt", "package.json", "pom.xml"]
      mark_unpinned: true

  # Phase 3A: Frontend CDN detection
  - plugin: "frontend_scanner"
    enabled: true
    config:
      html_scan_paths: [".", "./public"]
      detect_cdn: true
      scan_static_assets: true
      static_extensions: [".js", ".css"]
      min_file_size_bytes: 100

  # Phase 3B: JS fingerprinting with RetireJS
  - plugin: "js_fingerprinter"
    enabled: true
    config:
      use_retirejs_db: true
      cache_dir: "~/.depnova/cache"
      cache_ttl_hours: 24
      scan_sourcemaps: true
      include_vulnerabilities: true
      min_file_size_bytes: 500
