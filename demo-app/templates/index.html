<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accops Employee Portal</title>

    <!-- CSS: Bootstrap from jsDelivr CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS: Font Awesome from cdnjs CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS: DataTables from cdnjs CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/jquery.dataTables.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Accops Employee Portal</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <h2>Dashboard</h2>
                <div id="chart-container">
                    <canvas id="salesChart"></canvas>
                </div>
                <div id="employee-table" class="mt-4"></div>
            </div>
            <div class="col-md-4">
                <div id="notifications"></div>
            </div>
        </div>
    </div>

    <!-- =========================================================
         This is what makes Phase 3 critical:
         
         A security auditor scanning this project with Syft or Trivy 
         would find NOTHING below. These libraries are invisible to 
         standard SCA tools because they come from CDNs, not from 
         any package.json or lock file.
         
         DepNova's Phase 3 catches ALL of them.
    ========================================================= -->

    <!-- JS: jQuery from cdnjs (KNOWN VULNERABLE — CVE-2020-11022) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <!-- JS: Bootstrap Bundle from jsDelivr -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS: Moment.js from cdnjs (KNOWN VULNERABLE — CVE-2022-31129) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>

    <!-- JS: Chart.js from cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <!-- JS: DataTables from cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>

    <!-- JS: Lodash from Google CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/lodash/4.17.21/lodash.min.js"></script>

    <!-- JS: SweetAlert2 from unpkg -->
    <script src="https://unpkg.com/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>

    <!-- JS: Local vendor file (fingerprinted by Phase 3B) -->
    <script src="/assets/js/jquery.validate.min.js"></script>

    <!-- JS: Webpack bundle (analyzed by Phase 3C via source map) -->
    <script src="/dist/app.bundle.js"></script>

    <script>
        // App initialization - this inline script is NOT a dependency
        $(document).ready(function() {
            console.log("Portal loaded");
        });
    </script>
</body>
</html>
